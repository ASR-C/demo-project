<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Consultancy Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .card {
            border-radius: 15px;
        }
        .navbar {
            background-color: #0d6efd;
        }
        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <span class="navbar-brand">🚀 Product Consultancy</span>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Product Dashboard</h2>

    <!-- Add Product Form -->
    <div class="card p-4 mb-4 shadow">
        <h4>Add Product</h4>
        <form action="/add" method="post">
            <div class="row">
                <div class="col">
                    <input type="text" name="name" class="form-control" placeholder="Product Name">
                </div>
                <div class="col">
                    <input type="text" name="category" class="form-control" placeholder="Category">
                </div>
                <div class="col">
                    <input type="number" name="price" class="form-control" placeholder="Price">
                </div>
                <div class="col">
                    <button class="btn btn-primary">Add</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Product List -->
    <div class="row">
        <div class="col-md-4 mb-3" th:each="p : ${products}">
            <div class="card shadow p-3">
                <h5 th:text="${p.name}"></h5>
                <p>Category: <span th:text="${p.category}"></span></p>
                <p>Price: ₹<span th:text="${p.price}"></span></p>
            </div>
        </div>
    </div>

</div>

</body>
</html>
